name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Ruff auto-fix pass (informational)
        continue-on-error: true
        run: ruff check . --exclude vendor,loot,build,dist,cve_db/prewarm_cache.json --fix

      - name: Ruff check (blocking)
        run: ruff check . --exclude vendor,loot,build,dist,cve_db/prewarm_cache.json --no-fix --output-format=github

      - name: Bandit security lint (informational)
        continue-on-error: true
        run: bandit -r . -x ./tests,./vendor,./loot,./build,./dist -ll

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install project (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest-timeout

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --timeout=60

      - name: Coverage report
        run: pytest --cov=core --cov=modules --cov=cve_db --cov-report=term

  security:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit declared dependencies
        run: pip-audit --strict

  build-exe:
    name: Build Windows executable
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project (full + dev) and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .[full,dev] pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller bazooka.spec --noconfirm

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazooka-exe
          path: dist/bazooka.exe
          if-no-files-found: error
