<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAZOOKA — Scan {{ scan.url }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root {
    --bz-primary: #5851DB;
    --bz-dark: #1A172A;
    --bz-light: #F6F7F9;
    --bz-danger: #f12828;
    --bz-warning: #ff6a00;
    --bz-success: #4CAF50;
    --bz-info: #0F82FF;
}
body { background: var(--bz-light); font-family: 'Segoe UI', system-ui, sans-serif; }
.navbar-custom { background-color: var(--bz-dark); }
.navbar-custom .navbar-brand { color: #fa9c1a; font-weight: 700; font-size: 1.4rem; }
.navbar-custom .nav-link { color: rgba(255,255,255,0.85); }

.scan-container {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 2rem;
    margin-top: 2rem;
}

/* Log area — dark background, high contrast */
.log-area {
    background: #1a1b26;
    color: #e0e0e0;
    font-family: 'Consolas', 'SF Mono', 'Monaco', monospace;
    font-size: 0.82rem;
    padding: 1rem 1.25rem;
    border-radius: 8px;
    height: 500px;
    overflow-y: auto;
    line-height: 1.75;
    border: 1px solid #2a2b3d;
}
.log-area::-webkit-scrollbar { width: 6px; }
.log-area::-webkit-scrollbar-track { background: #1e1e2e; }
.log-area::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

/* Log line types */
.log-line { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
.log-ts { color: #8890a0; font-size: 0.75rem; }
.log-phase {
    color: #89b4fa; font-weight: 600; display: block;
    margin-top: 0.6rem; padding: 0.25rem 0.5rem;
    background: rgba(137,180,250,0.08);
    border-left: 3px solid #89b4fa;
    border-radius: 0 4px 4px 0;
}
.log-critical { color: #f38ba8; font-weight: 600; }
.log-critical .sev-badge { background: #f38ba8; color: #1e1e2e; padding: 0 5px; border-radius: 3px; font-size: 0.7rem; font-weight: 700; margin-right: 6px; }
.log-high { color: #fab387; font-weight: 500; }
.log-high .sev-badge { background: #fab387; color: #1e1e2e; padding: 0 5px; border-radius: 3px; font-size: 0.7rem; font-weight: 700; margin-right: 6px; }
.log-medium { color: #f9e2af; }
.log-medium .sev-badge { background: #f9e2af; color: #1e1e2e; padding: 0 5px; border-radius: 3px; font-size: 0.7rem; font-weight: 700; margin-right: 6px; }
.log-low { color: #89b4fa; }
.log-low .sev-badge { background: #89b4fa; color: #1e1e2e; padding: 0 5px; border-radius: 3px; font-size: 0.7rem; font-weight: 700; margin-right: 6px; }
.log-info { color: #8890a0; }
.log-info .sev-badge { background: #3a3d50; color: #c0c8d8; padding: 0 5px; border-radius: 3px; font-size: 0.7rem; margin-right: 6px; }
.log-error { color: #f38ba8; font-style: italic; }
.log-ok { color: #a6e3a1; font-weight: 600; }
.log-start { color: #a6e3a1; }
.log-summary { color: #cba6f7; font-weight: 500; padding-left: 0.5rem; border-left: 2px solid #45475a; margin: 0.15rem 0; }
.log-banner { color: #cba6f7; font-weight: 700; font-size: 0.85rem; }
.log-meta { color: #8890a0; }
.spinner-line { color: #89b4fa; }
.spinner-line .spin { display: inline-block; animation: spin-frames 0.8s steps(4) infinite; }
@keyframes spin-frames {
    0% { content: '|'; } 25% { content: '/'; } 50% { content: '-'; } 75% { content: '\\'; }
}
/* CSS can't animate content, so we do it in JS instead */
.log-score { color: #a6e3a1; font-weight: 700; margin-top: 0.3rem; padding: 0.15rem 0; }
.log-empty { height: 0.4rem; }

/* Animations for new findings */
.log-line.slide-in {
    animation: slideIn 0.3s ease-out;
}
.log-critical.slide-in {
    animation: slideIn 0.3s ease-out, flashRed 0.6s ease-out;
}
.log-high.slide-in {
    animation: slideIn 0.3s ease-out, flashOrange 0.5s ease-out;
}
@keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
}
@keyframes flashRed {
    0% { background: rgba(243,139,168,0.2); }
    100% { background: transparent; }
}
@keyframes flashOrange {
    0% { background: rgba(250,179,135,0.15); }
    100% { background: transparent; }
}
.log-phase.slide-in {
    animation: slideIn 0.3s ease-out, phaseGlow 0.8s ease-out;
}
@keyframes phaseGlow {
    0% { background: rgba(137,180,250,0.2); }
    100% { background: rgba(137,180,250,0.08); }
}

.stat-card {
    background: var(--bz-light);
    border-radius: 10px;
    padding: 1.25rem;
    text-align: center;
}
.stat-value { font-size: 2rem; font-weight: 700; }
.stat-label { font-size: 0.8rem; text-transform: uppercase; color: #666; letter-spacing: 1px; }

.phase-indicator {
    display: inline-block;
    padding: 0.4em 1em;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.9rem;
    color: #fff;
    background: var(--bz-primary);
    animation: pulse 1.5s infinite;
}
.phase-done { background: var(--bz-success); animation: none; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

.score-critical { color: var(--bz-danger); }
.score-high { color: var(--bz-warning); }
.score-medium { color: #E8A317; }
.score-good { color: var(--bz-success); }
</style>
</head>
<body>

<nav class="navbar navbar-custom navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">&#128163; BAZOOKA</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="max-width: 1100px;">
    <div class="scan-container">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="mb-1"><i class="bi bi-crosshair"></i> {{ scan.url }}</h3>
                <span class="text-muted">Profil: {{ scan.profile }} | Demarre: {{ scan.started[:19] }} | <span id="elapsedTime">0s</span></span>
            </div>
            <div>
                <span class="phase-indicator" id="phaseLabel">{{ scan.phase }}</span>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="progress mb-4" style="height: 8px;">
            <div class="progress-bar" id="progressBar"
                 role="progressbar"
                 style="width: {{ scan.progress }}%; background: var(--bz-primary); transition: width 0.5s;">
            </div>
        </div>

        <!-- Stats row -->
        <div class="row g-3 mb-4">
            <div class="col">
                <div class="stat-card">
                    <div class="stat-value" id="findingsCount">{{ scan.findings_count }}</div>
                    <div class="stat-label">Findings</div>
                </div>
            </div>
            <div class="col">
                <div class="stat-card">
                    <div class="stat-value score-good" id="maxCvss">-</div>
                    <div class="stat-label">CVSS Max</div>
                </div>
            </div>
            <div class="col">
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--bz-danger);" id="criticalCount">0</div>
                    <div class="stat-label">Critical</div>
                </div>
            </div>
            <div class="col">
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--bz-warning);" id="highCount">0</div>
                    <div class="stat-label">High</div>
                </div>
            </div>
            <div class="col">
                <div class="stat-card">
                    <div class="stat-value" style="color: #E8A317;" id="mediumCount">0</div>
                    <div class="stat-label">Medium</div>
                </div>
            </div>
        </div>

        <!-- Live Log -->
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="mb-0"><i class="bi bi-terminal"></i> Live Log</h5>
            <small class="text-muted" id="reqCount">0 requetes</small>
        </div>
        <div class="log-area" id="logArea"></div>

        <!-- Sticky activity bar — toujours visible -->
        <div id="activityBar" style="
            display:none; margin-top:0.5rem; padding:0.6rem 1rem;
            background:#1a1b26; color:#e0e0e0; border:1px solid #2a2b3d;
            border-radius:8px; font-family:'Consolas',monospace; font-size:0.85rem;
            display:flex; align-items:center; gap:0.75rem;">
            <span id="activityAscii" style="color:#fab387; font-weight:700; min-width:13ch; display:inline-block;">( •_•)</span>
            <span id="activitySpin" style="color:#89b4fa; font-weight:700; width:1ch; display:inline-block;">|</span>
            <span id="activityPhase" style="color:#89b4fa; font-weight:600;">—</span>
            <span style="color:#8890a0;">|</span>
            <span id="activityCurrent" style="color:#a6e3a1; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">en attente...</span>
            <span id="activityCounter" style="color:#cba6f7; font-weight:600;">0/0</span>
        </div>

        <!-- Actions (shown when done) -->
        <div class="mt-3 text-center" id="actionsArea" style="display: none;">
            <a href="#" id="reportLink" class="btn btn-lg" style="background: var(--bz-primary); color: #fff;">
                <i class="bi bi-file-earmark-text"></i> Voir le Rapport Complet
            </a>
            <a href="/" class="btn btn-lg btn-outline-secondary ms-2">
                <i class="bi bi-arrow-left"></i> Retour
            </a>
        </div>
    </div>
</div>

<script>
const scanId = "{{ scan.id }}";
const logArea = document.getElementById('logArea');
const progressBar = document.getElementById('progressBar');
const phaseLabel = document.getElementById('phaseLabel');
const findingsCount = document.getElementById('findingsCount');
const maxCvss = document.getElementById('maxCvss');
const criticalCount = document.getElementById('criticalCount');
const highCount = document.getElementById('highCount');
const mediumCount = document.getElementById('mediumCount');
const actionsArea = document.getElementById('actionsArea');
const reportLink = document.getElementById('reportLink');
const elapsedTime = document.getElementById('elapsedTime');
const reqCount = document.getElementById('reqCount');

const startTs = Date.now();
const timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTs) / 1000);
    elapsedTime.textContent = s >= 60 ? Math.floor(s/60) + 'm' + (s%60).toString().padStart(2,'0') + 's' : s + 's';
}, 1000);

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addLog(line) {
    const div = document.createElement('div');
    div.className = 'log-line';

    const ts = extractTs(line);
    const tsHtml = ts ? `<span class="log-ts">[${ts}]</span> ` : '';
    const body = line.replace(/^\[[^\]]+\]\s*/, '');
    const bodyEsc = esc(body);

    // Empty line
    if (!body.trim()) {
        div.className = 'log-line log-empty';
        logArea.appendChild(div);
        return;
    }

    // Banner / header
    if (body.startsWith('WORDPRESS BAZOOKA')) {
        div.className = 'log-line log-banner';
        div.innerHTML = tsHtml + bodyEsc;
    }
    // Target/Profile/Threads info
    else if (body.startsWith('Target:') || body.startsWith('Profile:')) {
        div.className = 'log-line log-meta';
        div.innerHTML = tsHtml + bodyEsc;
    }
    // Phase header
    else if (body.match(/^\[(BOOTSTRAP|RECON|ENUM|VULN|EXPLOIT|INFRA|SCORE|REPORT)\]/)) {
        div.className = 'log-line log-phase';
        div.innerHTML = tsHtml + bodyEsc;
    }
    // Severity findings
    else if (body.match(/^\s*(CRITICAL)/)) {
        div.className = 'log-line log-critical';
        const msg = body.replace(/^\s*CRITICAL\s*/, '').replace(/^\s*\[[^\]]*\]\s*/, '');
        div.innerHTML = tsHtml + '<span class="sev-badge">CRITICAL</span>' + esc(msg);
    }
    else if (body.match(/^\s*(HIGH)/)) {
        div.className = 'log-line log-high';
        const msg = body.replace(/^\s*HIGH\s*/, '').replace(/^\s*\[[^\]]*\]\s*/, '');
        div.innerHTML = tsHtml + '<span class="sev-badge">HIGH</span>' + esc(msg);
    }
    else if (body.match(/^\s*(MEDIUM)/)) {
        div.className = 'log-line log-medium';
        const msg = body.replace(/^\s*MEDIUM\s*/, '').replace(/^\s*\[[^\]]*\]\s*/, '');
        div.innerHTML = tsHtml + '<span class="sev-badge">MEDIUM</span>' + esc(msg);
    }
    else if (body.match(/^\s*(LOW)/)) {
        div.className = 'log-line log-low';
        const msg = body.replace(/^\s*LOW\s*/, '').replace(/^\s*\[[^\]]*\]\s*/, '');
        div.innerHTML = tsHtml + '<span class="sev-badge">LOW</span>' + esc(msg);
    }
    else if (body.match(/^\s*(INFO)/) && !body.includes('Starting')) {
        div.className = 'log-line log-info';
        const msg = body.replace(/^\s*INFO\s*/, '').replace(/^\s*\[[^\]]*\]\s*/, '');
        div.innerHTML = tsHtml + '<span class="sev-badge">INFO</span>' + esc(msg);
    }
    // Summary lines (=> ...)
    else if (body.match(/^\s*=>/)) {
        div.className = 'log-line log-summary';
        div.innerHTML = tsHtml + bodyEsc;
    }
    // Score
    else if (body.includes('CVSS') || body.includes('CRITICAL:') || body.includes('Requests:')) {
        div.className = 'log-line log-score';
        div.innerHTML = tsHtml + bodyEsc;
    }
    // Error
    else if (body.includes('ERROR')) {
        div.className = 'log-line log-error';
        div.innerHTML = tsHtml + bodyEsc;
    }
    // Completion
    else if (body.includes('complete') || body.includes('Generating')) {
        div.className = 'log-line log-ok';
        div.innerHTML = tsHtml + bodyEsc;
    }
    // WAF / baseline info
    else if (body.includes('WAF:') || body.includes('Baseline')) {
        div.className = 'log-line log-meta';
        div.innerHTML = tsHtml + bodyEsc;
    }
    // Default
    else {
        div.className = 'log-line';
        div.innerHTML = tsHtml + bodyEsc;
    }

    div.classList.add('slide-in');
    logArea.appendChild(div);
    logArea.scrollTop = logArea.scrollHeight;
}

function extractTs(line) {
    const m = line.match(/^\[([^\]]+)\]/);
    return m ? m[1] : '';
}

function updateCvssColor(val) {
    maxCvss.className = 'stat-value';
    if (val >= 9) maxCvss.classList.add('score-critical');
    else if (val >= 7) maxCvss.classList.add('score-high');
    else if (val >= 4) maxCvss.classList.add('score-medium');
    else maxCvss.classList.add('score-good');
}

// Sticky activity bar — always visible below log area
const activityBar = document.getElementById('activityBar');
const activitySpin = document.getElementById('activitySpin');
const activityAscii = document.getElementById('activityAscii');
const activityPhase = document.getElementById('activityPhase');
const activityCurrent = document.getElementById('activityCurrent');
const activityCounter = document.getElementById('activityCounter');

const spinChars = ['|', '/', '-', '\\'];

// ASCII animations per phase — variées, racontent une mini-histoire
const asciiByPhase = {
    RECON: [
        '(o_o)  🔍  ', '(°o°) 🔍   ', '(>_<)🔍    ',
        '(•_•)  📡  ', '(•_•)~ 📡  ', '(O_O) 📡!! ',
        '(¬_¬)  🗺  ', '(◕‿◕) 🗺✓  ',
    ],
    ENUM: [
        '(•◡•) wp?  ', '(•◡•)? 🔎  ', '(◉_◉)! 🔎  ',
        '(>‿◠) > ls ', '(>‿◠) >> ls', '(◉‿◉) found',
        '╰(°▽°)╯plug', '(˘ʃƪ˘) auth',
    ],
    VULN: [
        'ᕦ(ò_ó)ᕤ    ', '(ง •̀_•́)ง   ', '(ง\'̀-\'́)ง > ',
        '( ͠° ͟ʖ ͡°) sqli', '( ͠° ͟ʖ ͡°) xss ', '( ͡⊙ ͜ʖ ͡⊙) csrf',
        '(ಠ_ಠ) cve ?', '(ಠ‿ಠ) cve!! ',
    ],
    EXPLOIT: [
        '(⌐■_■)      ', '(⌐■_■) 🔫   ', '(⌐■_■) 🔫💥 ',
        '(⌐■_■) >>>>>', '(⌐■_■) HACK!', '(⌐■_■) BOOM!',
        '(•̀ᴗ•́)و✧ pop', '(✿◠‿◠) win  ',
    ],
    INFRA: [
        '[>         ]', '[==>       ]', '[====>     ]',
        '[======>   ]', '[========> ]', '[==========]',
        '[ ⚡ scan  ]', '[ ✓ done   ]',
    ],
    SCORE: [
        '\\(^o^)/    ', '\\(°▽°)/    ', '(•‿•)       ',
        '(✿◠‿◠)     ', '(づ ◕‿◕)づ  ', '╰(°▽°)╯     ',
    ],
    REPORT: [
        '📋 ✏ . . . ', '📋 ✏ .. .. ', '📋 ✏ ... . ',
        '📋 ✓ done  ', '📋 → docx  ', '📋 → html  ',
    ]
};
const asciiDefault = [
    '( •_•)  ', '( ⊙_⊙)? ', '( ◉_◉)! ', '( •̀ω•́ )',
    '(づ｡◕‿‿◕｡)づ', '¯\\_(ツ)_/¯',
];

let asciiIdx = 0;
let spinIdx = 0;
let spinnerInterval = null;
let curPhase = '';
let modsTotal = 0;
let modsDone = 0;
const running = new Set();

function currentAsciiFrames() {
    return asciiByPhase[curPhase] || asciiDefault;
}
function ensureSpinner() {
    if (spinnerInterval) return;
    activityBar.style.display = 'flex';
    spinnerInterval = setInterval(() => {
        spinIdx = (spinIdx + 1) % spinChars.length;
        activitySpin.textContent = spinChars[spinIdx];
        // ASCII char animation — slower (every 3 ticks = ~450ms)
        if (spinIdx % 3 === 0) {
            const frames = currentAsciiFrames();
            asciiIdx = (asciiIdx + 1) % frames.length;
            activityAscii.textContent = frames[asciiIdx];
        }
    }, 150);
}
function stopSpinner() {
    if (spinnerInterval) { clearInterval(spinnerInterval); spinnerInterval = null; }
    activitySpin.textContent = '*';
    activityAscii.textContent = '\\(^o^)/';
}
function refreshActivity() {
    activityPhase.textContent = curPhase || '—';
    activityCounter.textContent = modsDone + '/' + modsTotal;
    if (running.size === 0) {
        activityCurrent.textContent = modsDone >= modsTotal && modsTotal > 0 ? 'phase terminee' : 'en attente...';
    } else {
        const arr = [...running];
        activityCurrent.textContent = arr.length === 1
            ? arr[0]
            : arr[arr.length - 1] + ' (+' + (arr.length - 1) + ' autres)';
    }
}

const ws = new WebSocket(`ws://${location.host}/ws/scan/${scanId}`);

ws.onmessage = function(event) {
    const data = JSON.parse(event.data);

    progressBar.style.width = data.progress + '%';
    if (data.progress >= 100) progressBar.style.background = 'var(--bz-success)';

    phaseLabel.textContent = data.phase;
    findingsCount.textContent = data.findings_count;

    if (data.new_logs && data.new_logs.length > 0) {
        for (const line of data.new_logs) {
            // Strip timestamp prefix for parsing
            const body = line.replace(/^\[[^\]]+\]\s*/, '');

            // Phase start: "[RECON] Running 13 checks..."
            const phaseStart = body.match(/^\[(RECON|ENUM|VULN|EXPLOIT|INFRA)\]\s+Running\s+(\d+)/);
            if (phaseStart) {
                curPhase = phaseStart[1];
                modsTotal = parseInt(phaseStart[2], 10);
                modsDone = 0;
                running.clear();
                asciiIdx = 0;
                activityAscii.textContent = currentAsciiFrames()[0];
                ensureSpinner();
                refreshActivity();
            }
            // Module start: "  > module_name..."
            const modStart = body.match(/^\s*>\s+(\S+)/);
            if (modStart) {
                running.add(modStart[1]);
                refreshActivity();
            }
            // Module end ok/skip/error: "  < name ok", "  - name: skipped", "  ! name ERROR"
            const modEnd = body.match(/^\s*[<\-!]\s+(\S+)/);
            if (modEnd) {
                running.delete(modEnd[1]);
                modsDone++;
                refreshActivity();
            }
            // End of scan / score / report → stop spinner
            if (body.match(/^\[(SCORE|REPORT)\]/) || body.startsWith('Scan complete')) {
                stopSpinner();
                running.clear();
                refreshActivity();
            }

            addLog(line);
        }
    }

    if (data.severity_counts) {
        criticalCount.textContent = data.severity_counts.CRITICAL || 0;
        highCount.textContent = data.severity_counts.HIGH || 0;
        mediumCount.textContent = data.severity_counts.MEDIUM || 0;
    }

    if (data.max_cvss !== undefined && data.max_cvss > 0) {
        maxCvss.textContent = data.max_cvss.toFixed(1);
        updateCvssColor(data.max_cvss);
    }

    if (data.done) {
        clearInterval(timerInterval);
        stopSpinner();
        activityBar.style.display = 'none';
        phaseLabel.textContent = 'TERMINE';
        phaseLabel.classList.add('phase-done');
        actionsArea.style.display = '';
        if (data.domain) reportLink.href = '/report/' + data.domain;
        ws.close();
    }
};

ws.onerror = function() {
    addLog('[ERROR] Connexion WebSocket perdue - rafraichir la page');
};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
